# Build the backend image and deploy it to Cloud Run.
# Trigger: gcloud builds submit --config deploy/cloudbuild.yaml
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/shorts-factory-backend:latest
      - ./backend
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/shorts-factory-backend:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - replace
      - deploy/cloudrun-service.yaml
      - --region=$_REGION
substitutions:
  _REGION: us-central1
images:
  - gcr.io/$PROJECT_ID/shorts-factory-backend:latest
